<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PnP 幾何窗口益智桌遊產生器 - 職能治療師鄭凱文設計</title>
  
  <!-- 引入 Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Lucide 圖標庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- 引入 jsPDF 印刷導出核心 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* 避免滑動時選擇到文字或元件 */
    .select-none {
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
    }
    input[type="range"] {
      cursor: pointer;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-100 flex flex-col p-4 md:p-6 font-sans select-none overflow-x-hidden">

  <!-- 獨立 Toast 訊息提示元件 -->
  <div id="toast" class="fixed top-6 right-6 z-[9999] px-6 py-4 rounded-2xl shadow-xl border text-sm font-semibold transition-all transform translate-y-[-100px] opacity-0 pointer-events-none flex items-center gap-3">
    <span id="toast-icon">ℹ️</span>
    <span id="toast-text">提示訊息</span>
  </div>

  <div class="max-w-7xl mx-auto w-full flex-1 flex flex-col lg:flex-row gap-6">
    
    <!-- 左側：控制面板 -->
    <aside class="w-full lg:w-[380px] flex flex-col gap-6 shrink-0">
      
      <!-- 主選單：標題與基本說明 -->
      <div class="bg-white p-5 rounded-3xl shadow-md border border-slate-200">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-2xl">🧩</span>
          <h1 class="text-lg font-bold text-slate-800">PnP 幾何窗口拼圖產生器</h1>
        </div>
        <p class="text-xs text-slate-500 leading-relaxed">
          這是一款符合 A4 印刷標準的益智手工桌遊設計工具。您可以在上方彩色底座自由配置底色塊與窗口位置，列印成品與設計畫面將絕對對應。
        </p>

        <!-- 編輯模式切換 Tab (先底板色塊，再裁剪窗口) -->
        <div class="mt-4 border-t border-slate-100 pt-4">
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">🕹️ 選擇編輯圖層</h3>
          <div class="flex bg-slate-100 p-1 rounded-xl">
            <button id="tab-blocks" onclick="setEditMode('blocks')" class="flex-1 py-2.5 rounded-lg text-xs font-bold transition-all bg-white text-indigo-600 shadow-sm">
              🎨 調整底板色塊 (1-6)
            </button>
            <button id="tab-windows" onclick="setEditMode('windows')" class="flex-1 py-2.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-800">
              ✂️ 調整裁剪窗口 (1-8)
            </button>
          </div>
        </div>

        <div class="mt-4 flex flex-col gap-3">
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">🛠️ 快速操作面板</h3>
          <div class="grid grid-cols-2 gap-2">
            <button onclick="randomizeLayout()" class="bg-slate-50 hover:bg-slate-100 border border-slate-200 active:scale-95 text-slate-700 font-semibold py-2.5 px-3 rounded-xl transition-all text-xs flex items-center justify-center gap-1.5">
              🎲 隨機窗口
            </button>
            <button onclick="resetLayout()" class="bg-slate-50 hover:bg-slate-100 border border-slate-200 active:scale-95 text-slate-700 font-semibold py-2.5 px-3 rounded-xl transition-all text-xs flex items-center justify-center gap-1.5">
              🔄 恢復經典
            </button>
          </div>
          <button onclick="exportToA4PDF()" class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-bold py-3 px-4 rounded-xl shadow-md shadow-indigo-100 transition-all text-xs flex items-center justify-center gap-1.5 mt-1">
            <i data-lucide="download" class="w-4 h-4"></i> 下載 A4 PDF 印刷檔案
          </button>
        </div>
      </div>

      <!-- 色彩主題更換面板 -->
      <div class="bg-white p-5 rounded-3xl shadow-md border border-slate-200">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">🎨 底板色彩主題</h3>
        <div class="grid grid-cols-2 gap-2" id="theme-buttons-container">
          <!-- 動態渲染主題按鈕 -->
        </div>

        <!-- 自訂色彩調整區 -->
        <div id="custom-colors-panel" class="hidden mt-3 p-3 bg-slate-50 rounded-2xl border border-slate-100 flex flex-col gap-2">
          <span class="text-[11px] font-bold text-slate-500 block">🎨 自訂 6 塊底板色塊顏色：</span>
          <div class="grid grid-cols-3 gap-2" id="color-pickers-container">
            <!-- 動態渲染 6 個色盤 -->
          </div>
        </div>
      </div>

      <!-- 動態微調編輯面板 (視 editMode 而定) -->
      <div class="bg-white p-5 rounded-3xl shadow-md border border-slate-200" id="controls-panel">
        <!-- 由 JavaScript 動態填入 -->
      </div>
    </aside>

    <!-- 右側：A4 格式預覽區 -->
    <section class="flex-1 flex flex-col items-center">
      <div class="mb-3 flex items-center gap-1.5 self-start lg:self-center text-xs font-semibold text-slate-500">
        <span class="inline-block w-2.5 h-2.5 rounded-full bg-indigo-500 animate-pulse"></span>
        <span id="preview-status-text">A4 實體列印排版預覽 (當前正編輯底座彩色色塊)</span>
      </div>

      <!-- 虛擬 A4 紙張本體 -->
      <div id="a4-container" class="relative w-full max-w-[640px] bg-white rounded-2xl shadow-xl border border-slate-300 overflow-hidden aspect-[210/297] select-none" style="touch-action: none;">
        
        <!-- 頂部標題名稱 -->
        <div id="a4-header" class="absolute left-0 right-0 p-5 select-none pointer-events-none origin-top-left" style="top: 0; width: 800px;">
          <h2 class="text-xl font-black text-slate-900 tracking-tight">🧩 PnP 幾何窗口益智拼圖桌遊 (印出即玩)</h2>
        </div>

        <!-- 彩色底板主要編輯區域 (620x600 比例) -->
        <div id="a4-plate" class="absolute bg-white border border-slate-200 select-none overflow-hidden" style="left: 90px; top: 80px; width: 620px; height: 600px;">
          <!-- 色塊與視窗將在此處動態渲染 -->
        </div>

        <!-- 中間的 A4 裁剪引導虛線 (精確移動至 705 處，絕對不重疊 600px 高的底座圖案) -->
        <div id="a4-divider" class="absolute left-0 right-0 border-t-2 border-dashed border-slate-400 flex items-center px-8" style="top: 705px; height: 1px;">
          <span id="a4-divider-text" class="bg-white px-2 text-slate-500 font-bold select-none pointer-events-none origin-left">
            ✂️ 請沿這條虛線剪開：分出「上方底板」與「下方拼圖卡」
          </span>
        </div>

        <!-- 下方：8 塊即時裁剪拼圖卡本體 (無黑字遮擋、100% 完整色塊) -->
        <div id="a4-cards-container" class="absolute" style="left: 90px; top: 730px; width: 620px; height: 400px;">
          <!-- 拼圖卡在此動態生成 -->
        </div>

        <!-- A4 紙本最下方的淺灰色精美設計署名 -->
        <div id="a4-signature" class="absolute bottom-4 left-0 right-0 text-center text-slate-300 font-bold pointer-events-none select-none origin-bottom">
          設計：職能治療師 - 鄭凱文
        </div>

      </div>
    </section>
  </div>

  <!-- 網頁最下面的設計師頁尾 -->
  <footer class="w-full text-center py-6 mt-8 border-t border-slate-200 text-sm text-slate-500">
    設計：<a href="https://www.facebook.com/mpotkevin" target="_blank" rel="noopener noreferrer" class="text-indigo-600 font-semibold hover:underline">職能治療師 - 鄭凱文</a>
  </footer>

  <script>
    // 虛擬 A4 畫布座標系統 (符合 210:297 比例)
    const A4_WIDTH = 800;
    const A4_HEIGHT = 1130;

    // 內部彩色底板大小定義 (符合 950x950 座標系)
    const INTERNAL_BASE_SIZE = 950;

    // A4 頁面中，彩色底板的擺放參數 (寬 620, 高 600)
    const PLATE_WIDTH_ON_A4 = 620; 
    const PLATE_HEIGHT_ON_A4 = 600; 
    const PLATE_X = 90; // 置中：(800 - 620) / 2 = 90
    const PLATE_Y = 80;

    // 雙向獨立橫縱縮放係數
    const plateToA4ScaleX = PLATE_WIDTH_ON_A4 / INTERNAL_BASE_SIZE; // 620/950 = 0.6526
    const plateToA4ScaleY = PLATE_HEIGHT_ON_A4 / INTERNAL_BASE_SIZE; // 600/950 = 0.6315

    // 8塊拼圖卡的排版邊界與網格配置
    const START_X = 90; 
    const START_Y = 730; 

    // 三種經典主題色配置
    const THEMES = {
      spring: {
        name: '🎨 暖陽春日 (Pastel)',
        colors: ['#ff69b4', '#ffd700', '#ff8da1', '#ffa500', '#1e90ff', '#ffb703', '#adff2f', '#ffc0cb', '#8ecae6']
      },
      retro: {
        name: '📻 復古摩登 (Retro)',
        colors: ['#e07a5f', '#f4f1de', '#3d405b', '#81b29a', '#f2cc8f', '#1d3557', '#457b9d', '#a8dadc', '#e63946']
      },
      neon: {
        name: '⚡ 塞博霓虹 (Cyber)',
        colors: ['#ff007f', '#00ffff', '#7b2cbf', '#390099', '#ff5400', '#00f5d4', '#00bbf9', '#fee440', '#f15bb5']
      }
    };

    // 玩家自訂色彩
    let customColors = ['#e63946', '#f4a261', '#e9c46a', '#2a9d8f', '#264653', '#9b5de5'];

    // 全域 state
    let state = {
      editMode: 'blocks', // 'blocks' 或是 'windows'
      windows: [
        { id: 1, x: 60, y: 60, size: 180 },
        { id: 2, x: 380, y: 60, size: 180 },
        { id: 3, x: 700, y: 60, size: 180 },
        { id: 4, x: 60, y: 380, size: 180 },
        { id: 5, x: 380, y: 380, size: 180 },
        { id: 6, x: 700, y: 380, size: 180 },
        { id: 7, x: 220, y: 700, size: 180 },
        { id: 8, x: 540, y: 700, size: 180 },
      ],
      blocks: [
        { id: 1, colorIndex: 0, x: 400, y: 50, size: 300, zIndex: 1 },
        { id: 2, colorIndex: 1, x: 200, y: 80, size: 250, zIndex: 2 },
        { id: 3, colorIndex: 2, x: 50, y: 200, size: 300, zIndex: 3 },
        { id: 4, colorIndex: 3, x: 450, y: 350, size: 280, zIndex: 4 },
        { id: 5, colorIndex: 4, x: 100, y: 450, size: 320, zIndex: 5 },
        { id: 6, colorIndex: 5, x: 420, y: 500, size: 280, zIndex: 6 },
      ],
      currentTheme: 'spring',
      selectedWindowId: 1,
      selectedBlockId: 1
    };

    let displayScale = 1;
    let rAFRef = null;

    // Toast 提示框
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      const text = document.getElementById('toast-text');

      text.innerText = message;
      if (type === 'success') {
        icon.innerText = '✨';
        toast.className = 'fixed top-6 right-6 z-[9999] px-6 py-4 rounded-2xl shadow-xl border text-sm font-semibold transition-all transform duration-300 translate-y-0 opacity-100 bg-emerald-50 border-emerald-100 text-emerald-700 shadow-emerald-100';
      } else if (type === 'error') {
        icon.innerText = '❌';
        toast.className = 'fixed top-6 right-6 z-[9999] px-6 py-4 rounded-2xl shadow-xl border text-sm font-semibold transition-all transform duration-300 translate-y-0 opacity-100 bg-rose-50 border-rose-100 text-rose-700 shadow-rose-100';
      } else {
        icon.innerText = 'ℹ️';
        toast.className = 'fixed top-6 right-6 z-[9999] px-6 py-4 rounded-2xl shadow-xl border text-sm font-semibold transition-all transform duration-300 translate-y-0 opacity-100 bg-indigo-50 border-indigo-100 text-indigo-700 shadow-indigo-100';
      }

      setTimeout(() => {
        toast.className = 'fixed top-6 right-6 z-[9999] px-6 py-4 rounded-2xl shadow-xl border text-sm font-semibold transition-all transform duration-300 translate-y-[-100px] opacity-0 pointer-events-none';
      }, 3000);
    }

    // 取得當前色彩
    function getThemeColor(index) {
      if (state.currentTheme === 'custom') {
        return customColors[index % customColors.length];
      }
      const theme = THEMES[state.currentTheme] || THEMES.spring;
      return theme.colors[index % theme.colors.length];
    }

    // 取得拼圖卡網格座標
    function getCardCoords(index, winSize) {
      const col = index % 4;
      const row = Math.floor(index / 4);
      const cellW = 155; 
      const cellH = 175; 
      const cellCenterX = START_X + col * cellW + cellW / 2;
      const cellCenterY = START_Y + row * cellH + cellH / 2;
      
      const cardW = winSize * plateToA4ScaleX;
      const cardH = winSize * plateToA4ScaleY;
      
      return {
        x: cellCenterX - cardW / 2,
        y: cellCenterY - cardH / 2,
        w: cardW,
        h: cardH
      };
    }

    // 調整 RWD 縮放比例
    function updateDisplayScale() {
      const container = document.getElementById('a4-container');
      if (container) {
        const rect = container.getBoundingClientRect();
        displayScale = rect.width / A4_WIDTH;

        // 套用 scale 到不需要物理 DOM 移動的 A4 附屬文字/頁首，確保完全按 A4 比例縮放
        document.getElementById('a4-header').style.transform = `scale(${displayScale})`;
        document.getElementById('a4-signature').style.transform = `scale(${displayScale})`;
        document.getElementById('a4-divider-text').style.transform = `scale(${displayScale}) translateY(-50%)`;
        document.getElementById('a4-divider-text').style.fontSize = `9px`;
        
        render();
      }
    }

    // 切換編輯模式
    function setEditMode(mode) {
      state.editMode = mode;
      const tabBlocks = document.getElementById('tab-blocks');
      const tabWindows = document.getElementById('tab-windows');

      if (mode === 'blocks') {
        tabBlocks.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold transition-all bg-white text-indigo-600 shadow-sm';
        tabWindows.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-800';
        document.getElementById('preview-status-text').innerText = 'A4 實體列印排版預覽 (當前正編輯底座彩色色塊)';
      } else {
        tabWindows.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold transition-all bg-white text-indigo-600 shadow-sm';
        tabBlocks.className = 'flex-1 py-2.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-800';
        document.getElementById('preview-status-text').innerText = 'A4 實體列印排版預覽 (當前正編輯剪裁窗口)';
      }
      render();
    }

    // 同步所有的 8 塊拼圖小卡圖案 (SVG)
    function renderCardPatternHTML(win) {
      const sortedBlocks = [...state.blocks].sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));
      let rects = '';

      sortedBlocks.forEach(block => {
        const hasOverlap =
          block.x < win.x + win.size &&
          block.x + block.size > win.x &&
          block.y < win.y + win.size &&
          block.y + block.size > win.y;

        if (hasOverlap) {
          rects += `<rect x="${block.x}" y="${block.y}" width="${block.size}" height="${block.size}" fill="${getThemeColor(block.colorIndex)}" />`;
        }
      });

      return `
        <svg viewBox="${win.x} ${win.y} ${win.size} ${win.size}" preserveAspectRatio="none" class="w-full h-full bg-white">
          <rect x="${win.x}" y="${win.y}" width="${win.size}" height="${win.size}" fill="#ffffff" />
          ${rects}
        </svg>
      `;
    }

    // 底板拖曳與縮放核心事件
    function startDrag(e, item, target) {
      e.preventDefault();
      if (target === 'windows') {
        state.selectedWindowId = item.id;
      } else {
        state.selectedBlockId = item.id;
      }

      const isTouch = e.type.startsWith('touch');
      const startX = item.x;
      const startY = item.y;
      const clientX = isTouch ? e.touches[0].clientX : e.clientX;
      const clientY = isTouch ? e.touches[0].clientY : e.clientY;

      function handleMove(moveEvent) {
        const curX = moveEvent.touches ? moveEvent.touches[0].clientX : moveEvent.clientX;
        const curY = moveEvent.touches ? moveEvent.touches[0].clientY : moveEvent.clientY;
        const dx = (curX - clientX) / (displayScale * plateToA4ScaleX);
        const dy = (curY - clientY) / (displayScale * plateToA4ScaleY);

        let newX = Math.max(0, Math.min(INTERNAL_BASE_SIZE - item.size, startX + dx));
        let newY = Math.max(0, Math.min(INTERNAL_BASE_SIZE - item.size, startY + dy));

        if (rAFRef) cancelAnimationFrame(rAFRef);
        rAFRef = requestAnimationFrame(() => {
          item.x = Math.round(newX);
          item.y = Math.round(newY);
          render();
        });
      }

      function handleEnd() {
        window.removeEventListener('mousemove', handleMove);
        window.removeEventListener('mouseup', handleEnd);
        window.removeEventListener('touchmove', handleMove);
        window.removeEventListener('touchend', handleEnd);
      }

      window.addEventListener('mousemove', handleMove);
      window.addEventListener('mouseup', handleEnd);
      window.addEventListener('touchmove', handleMove, { passive: false });
      window.addEventListener('touchend', handleEnd);
    }

    function startResize(e, item, target) {
      e.stopPropagation();
      e.preventDefault();
      const isTouch = e.type.startsWith('touch');
      const startSize = item.size;
      const startX = item.x;
      const startY = item.y;
      const clientX = isTouch ? e.touches[0].clientX : e.clientX;

      function handleMove(moveEvent) {
        const curX = moveEvent.touches ? moveEvent.touches[0].clientX : moveEvent.clientX;
        const dx = (curX - clientX) / (displayScale * plateToA4ScaleX);

        let newSize = Math.max(40, Math.min(600, startSize + dx));

        if (startX + newSize > INTERNAL_BASE_SIZE) {
          newSize = INTERNAL_BASE_SIZE - startX;
        }
        if (startY + newSize > INTERNAL_BASE_SIZE) {
          newSize = INTERNAL_BASE_SIZE - startY;
        }

        if (rAFRef) cancelAnimationFrame(rAFRef);
        rAFRef = requestAnimationFrame(() => {
          item.size = Math.round(newSize);
          render();
        });
      }

      function handleEnd() {
        window.removeEventListener('mousemove', handleMove);
        window.removeEventListener('mouseup', handleEnd);
        window.removeEventListener('touchmove', handleMove);
        window.removeEventListener('touchend', handleEnd);
      }

      window.addEventListener('mousemove', handleMove);
      window.addEventListener('mouseup', handleEnd);
      window.addEventListener('touchmove', handleMove, { passive: false });
      window.addEventListener('touchend', handleEnd);
    }

    // 隨機窗口位置演算法
    function randomizeLayout() {
      const cells = [];
      const cols = [40, 265, 490, 715];
      const rows = [40, 265, 490, 715];
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          cells.push({ x: cols[c], y: rows[r] });
        }
      }
      const shuffled = [...cells].sort(() => Math.random() - 0.5);

      state.windows = state.windows.map((win, index) => {
        const cell = shuffled[index];
        const jitterX = Math.floor(Math.random() * 21) - 10;
        const jitterY = Math.floor(Math.random() * 21) - 10;
        const size = 180;
        return {
          ...win,
          x: cell.x + jitterX,
          y: cell.y + jitterY,
          size
        };
      });

      showToast('已隨機生成全新且不重疊的窗口！🎲', 'success');
      render();
    }

    // 恢復預設經典版面
    function resetLayout() {
      state.windows = [
        { id: 1, x: 60, y: 60, size: 180 },
        { id: 2, x: 380, y: 60, size: 180 },
        { id: 3, x: 700, y: 60, size: 180 },
        { id: 4, x: 60, y: 380, size: 180 },
        { id: 5, x: 380, y: 380, size: 180 },
        { id: 6, x: 700, y: 380, size: 180 },
        { id: 7, x: 220, y: 700, size: 180 },
        { id: 8, x: 540, y: 700, size: 180 },
      ];
      state.blocks = [
        { id: 1, colorIndex: 0, x: 400, y: 50, size: 300, zIndex: 1 },
        { id: 2, colorIndex: 1, x: 200, y: 80, size: 250, zIndex: 2 },
        { id: 3, colorIndex: 2, x: 50, y: 200, size: 300, zIndex: 3 },
        { id: 4, colorIndex: 3, x: 450, y: 350, size: 280, zIndex: 4 },
        { id: 5, colorIndex: 4, x: 100, y: 450, size: 320, zIndex: 5 },
        { id: 6, colorIndex: 5, x: 420, y: 500, size: 280, zIndex: 6 },
      ];
      showToast('已恢復無重疊預設經典版面 🧩', 'info');
      render();
    }

    // 調整圖層：往上移一層
    function moveLayerUp(id) {
      const currentBlock = state.blocks.find(b => b.id === id);
      if (!currentBlock) return;

      const higherBlocks = state.blocks.filter(b => b.zIndex > currentBlock.zIndex);
      if (higherBlocks.length === 0) {
        showToast(`色塊 ${id} 已經是最上層囉！`, 'info');
        return;
      }

      higherBlocks.sort((a, b) => a.zIndex - b.zIndex);
      const targetBlock = higherBlocks[0];

      const currentZ = currentBlock.zIndex;
      const targetZ = targetBlock.zIndex;

      currentBlock.zIndex = targetZ;
      targetBlock.zIndex = currentZ;

      showToast(`色塊 ${id} 已往上移了一層！`, 'success');
      render();
    }

    // 調整圖層：往下移一層
    function moveLayerDown(id) {
      const currentBlock = state.blocks.find(b => b.id === id);
      if (!currentBlock) return;

      const lowerBlocks = state.blocks.filter(b => b.zIndex < currentBlock.zIndex);
      if (lowerBlocks.length === 0) {
        showToast(`色塊 ${id} 已經是最底層囉！`, 'info');
        return;
      }

      lowerBlocks.sort((a, b) => b.zIndex - a.zIndex);
      const targetBlock = lowerBlocks[0];

      const currentZ = currentBlock.zIndex;
      const targetZ = targetBlock.zIndex;

      currentBlock.zIndex = targetZ;
      targetBlock.zIndex = currentZ;

      showToast(`色塊 ${id} 已往下移了一層！`, 'success');
      render();
    }

    // 同步縮放 8 個窗口
    function handleResizeAll(newSize) {
      state.windows = state.windows.map(win => {
        const updates = { size: newSize };
        if (win.x + newSize > INTERNAL_BASE_SIZE) {
          updates.x = INTERNAL_BASE_SIZE - newSize;
        }
        if (win.y + newSize > INTERNAL_BASE_SIZE) {
          updates.y = INTERNAL_BASE_SIZE - newSize;
        }
        return { ...win, ...updates };
      });
      render();
    }

        state.windows = state.windows.map(win => (win.id === id ? { ...win, ...data } : win));

      if (win.y + newSize > INTERNAL_BASE_SIZE) updates.y = INTERNAL_BASE_SIZE - newSize;
      updateSingleItem('windows', id, updates);

      const block = state.blocks.find(b => b.id === id);
      const updates = { size: newSize };
      if (block.x + newSize > INTERNAL_BASE_SIZE) updates.x = INTERNAL_BASE_SIZE - newSize;

      updateSingleItem('blocks', id, updates);

    // high-fidelity A4 置中排版演算法與 PDF 導出
    function calculateA4Position(targetWidth, targetHeight, orientation = 'p', margin = 10) {
      const isLand = orientation === 'l';
      const pageWidth = isLand ? 297 : 210;
      const pageHeight = isLand ? 210 : 297;
      const contentWidth = pageWidth - margin * 2;
      const contentHeight = pageHeight - margin * 2;
      const ratio = targetWidth / targetHeight;
      let drawW, drawH;

      if (ratio > contentWidth / contentHeight) {
        drawW = contentWidth;
        drawH = contentWidth / ratio;
      } else {
        drawH = contentHeight;
        drawW = drawH * ratio;
      }
      return {
        x: (pageWidth - drawW) / 2,
        y: (pageHeight - drawH) / 2,
        width: drawW,
        height: drawH,
      };
    }

    function exportToA4PDF() {
      if (!window.jspdf) {
        showToast('PDF 匯出模組仍在加載中，請稍候 1-2 秒再點選 📥', 'info');
        return;
      }

      try {
        showToast('正在產生高解析度 A4 PDF 印刷檔案...', 'success');
        
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const a4Coords = calculateA4Position(A4_WIDTH, A4_HEIGHT, 'p', 10);

        // 建立高清晰 Canvas (3x 縮放確保邊界銳利不模糊)
        const scale = 3.0;
        const canvas = document.createElement('canvas');
        canvas.width = A4_WIDTH * scale;
        canvas.height = A4_HEIGHT * scale;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 1. 繪製 A4 頁首標題 (已移除說明文字)
        ctx.fillStyle = '#111827';
        ctx.font = `bold ${22 * scale}px "Microsoft JhengHei", "PingFang TC", sans-serif`;
        ctx.fillText('🧩 PnP 幾何窗口益智拼圖桌遊 (印出即玩)', 50 * scale, 44 * scale);

        // 2. 繪製上方彩色底座 (620x600 比例)
        const px = PLATE_X * scale;
        const py = PLATE_Y * scale;
        const pWidth = PLATE_WIDTH_ON_A4 * scale;
        const pHeight = PLATE_HEIGHT_ON_A4 * scale;

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(px, py, pWidth, pHeight);
        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 2 * scale;
        ctx.strokeRect(px, py, pWidth, pHeight);

        // 繪製彩色大正方形
        const pdfPlateScaleX = pWidth / INTERNAL_BASE_SIZE;
        const pdfPlateScaleY = pHeight / INTERNAL_BASE_SIZE;
        const sortedBlocks = [...state.blocks].sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));
        sortedBlocks.forEach(block => {
          ctx.fillStyle = getThemeColor(block.colorIndex);
          ctx.fillRect(
            px + block.x * pdfPlateScaleX,
            py + block.y * pdfPlateScaleY,
            block.size * pdfPlateScaleX,
            block.size * pdfPlateScaleY
          );
        });

        // 繪製 8 個白色鏤空虛線框 (純淨虛線，無編號干擾)
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2 * scale;
        ctx.setLineDash([8 * scale, 6 * scale]);

        state.windows.forEach(win => {
          const wx = px + win.x * pdfPlateScaleX;
          const wy = py + win.y * pdfPlateScaleY;
          const wWidth = win.size * pdfPlateScaleX;
          const wHeight = win.size * pdfPlateScaleY;

          ctx.fillStyle = '#ffffff';
          ctx.fillRect(wx, wy, wWidth, wHeight);
          ctx.strokeRect(wx, wy, wWidth, wHeight);
        });

        // 3. 繪製中間：摺疊裁切分割虛線 (精確移動至 705 處，絕對不重疊)
        ctx.strokeStyle = '#94a3b8';
        ctx.lineWidth = 2 * scale;
        ctx.setLineDash([12 * scale, 8 * scale]);
        ctx.beginPath();
        ctx.moveTo(40 * scale, 705 * scale);
        ctx.lineTo((A4_WIDTH - 40) * scale, 705 * scale);
        ctx.stroke();

        ctx.fillStyle = '#475569';
        ctx.font = `bold ${11 * scale}px "Microsoft JhengHei", "PingFang TC", sans-serif`;
        ctx.fillText('✂️ 請沿這條虛線剪開：分出「上方底板」與「下方拼圖卡」', 50 * scale, 697 * scale);

        // 4. 繪製下方：8 塊完美與鏤空對齊的實體拼圖卡 (100% 乾淨無遮擋)
        state.windows.forEach((win, index) => {
          const cardCoords = getCardCoords(index, win.size);
          const cardX = cardCoords.x * scale;
          const cardY = cardCoords.y * scale;
          const cardW = cardCoords.w * scale;
          const cardH = cardCoords.h * scale;

          ctx.save();
          ctx.beginPath();
          ctx.rect(cardX, cardY, cardW, cardH);
          ctx.clip();

          ctx.fillStyle = '#ffffff';
          ctx.fillRect(cardX, cardY, cardW, cardH);

          // 橫縱向自適應拉伸縮放渲染
          const blockScaleX = cardW / win.size;
          const blockScaleY = cardH / win.size;
          const sortedBlocksForCard = [...state.blocks].sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));
          sortedBlocksForCard.forEach(block => {
            const bx = cardX + (block.x - win.x) * blockScaleX;
            const by = cardY + (block.y - win.y) * blockScaleY;
            const bW = block.size * blockScaleX;
            const bH = block.size * blockScaleY;
            ctx.fillStyle = getThemeColor(block.colorIndex);
            ctx.fillRect(bx, by, bW, bH);
          });

          ctx.restore();

          // 實線外邊框 (代表剪刀裁剪線)
          ctx.strokeStyle = '#1e293b';
          ctx.lineWidth = 4 * scale;
          ctx.setLineDash([]); 
          ctx.strokeRect(cardX, cardY, cardW, cardH);
        });

        // 繪製最下方淺灰色設計署名 (點陣繪製防偏移)
        ctx.fillStyle = '#cbd5e1'; 
        ctx.font = `bold ${9 * scale}px "Microsoft JhengHei", "PingFang TC", sans-serif`;
        ctx.fillText('設計：職能治療師 - 鄭凱文', (A4_WIDTH / 2 - 58) * scale, 1114 * scale);

        const imgData = canvas.toDataURL('image/jpeg', 0.98);
        pdf.addImage(imgData, 'JPEG', a4Coords.x, a4Coords.y, a4Coords.width, a4Coords.height);
        pdf.save('pnp_color_puzzle_kit.pdf');
        
        showToast('PDF 導出成功！已開始下載 🎯', 'success');
      } catch (err) {
        console.error(err);
        showToast('PDF 產生過程發生錯誤，請重試', 'error');
      }
    }

    // 初始化網頁與監聽事件
    window.onload = function () {
      initThemePanel();
      updateDisplayScale();
      window.addEventListener('resize', updateDisplayScale);
    }
  </script>
</body>
</html>
